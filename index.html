<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xtreame Aerospace</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI, sans-serif;
}

body{
  background:linear-gradient(135deg,#071a2f,#0a2a4f);
  color:white;
  min-height:100vh;
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 40px;
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(10px);
}

.logo{
  font-size:24px;
  font-weight:bold;
  color:#4fc3f7;
}

/* HERO */
.hero{
  text-align:center;
  padding:80px 20px 40px;
}

.hero h1{
  font-size:48px;
  margin-bottom:10px;
}

.hero p{
  color:#b0c4de;
}

/* CHAT */
.chat-container{
  width:90%;
  max-width:420px;
  margin:30px auto;
  background:rgba(0,0,0,0.35);
  border-radius:15px;
  padding:15px;
  backdrop-filter:blur(12px);
}

.chat-box{
  height:300px;
  overflow-y:auto;
  margin-bottom:10px;
}

.user-msg{
  text-align:right;
  color:#4fc3f7;
  margin:6px 0;
}

.bot-msg{
  text-align:left;
  color:white;
  margin:6px 0;
}

input{
  width:75%;
  padding:10px;
  border:none;
  border-radius:8px;
}

button{
  width:23%;
  padding:10px;
  background:#4fc3f7;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">🚀 Xtreame Aerospace</div>
</div>

<!-- HERO -->
<section class="hero">
  <h1>Next-Gen Aerospace Systems</h1>
  <p>AI • Space • Autonomous Future</p>
</section>

<!-- CHATBOT -->
<div class="chat-container">
  <div id="chatBox" class="chat-box"></div>

  <input id="userInput" type="text" placeholder="Ask Xtreame AI...">
  <button onclick="sendMessage()">Send</button>
</div>

<script>
function sendMessage(){
  const input=document.getElementById("userInput");
  const chatBox=document.getElementById("chatBox");
  const text=input.value.trim();
  if(!text) return;

  const user=document.createElement("div");
  user.className="user-msg";
  user.textContent=text;
  chatBox.appendChild(user);

  let reply="Xtreame AI is processing 🚀";

  const msg=text.toLowerCase();

  if(msg.includes("mars")){
    reply="Mars mission needs CO₂ electrolysis, water extraction, and life support.";
  }
  else if(msg.includes("rocket")){
    reply="Rocket systems must manage thrust, heat, and fuel efficiency.";
  }
  else if(msg.includes("hello")||msg.includes("hi")){
    reply="Hello Commander 👨‍🚀 Welcome to Xtreame Aerospace.";
  }

  setTimeout(()=>{
    const bot=document.createElement("div");
    bot.className="bot-msg";
    bot.textContent=reply;
    chatBox.appendChild(bot);
    chatBox.scrollTop=chatBox.scrollHeight;
  },500);

  input.value="";
}
</script>

</body>
</html>
